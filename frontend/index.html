<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIARSABA</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/fa/css/all.min.css">
    <script src="/vs/loader.js"></script>

    <style>
        /* --- UI del asistente de IA ---
           Monocromo, igual que el resto: hereda las variables de
           «todo el estilo {». Aquí no se declaran colores propios. */
        .editor-modal { position: relative; }

        .ai-button {
            border: 1px solid var(--graph-border);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--graph-text);
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .ai-button:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: var(--graph-border-active);
        }
        .ai-button:disabled { opacity: 0.6; cursor: default; }

        .ai-prompt {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            align-items: center;
            width: min(560px, 82%);
            padding: 8px;
            border-radius: 12px;
            background: var(--graph-bg-strong);
            border: 1px solid var(--graph-border);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 10;
        }

        .ai-prompt-input {
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            padding: 8px 10px;
            border-radius: 8px;
            color: var(--graph-text);
            background: rgba(255, 255, 255, 0.06);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .ai-prompt-input:focus { border-color: rgba(255, 255, 255, 0.55); }

        .ai-prompt-send {
            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: var(--graph-text);
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            font-family: inherit;
        }

        .ai-prompt-send:hover { background: rgba(255, 255, 255, 0.3); }
    </style>

    <script type="module" >
        import { SavePredefinedFunctions, AIChat, GetAIConfig, SetAIConfig, LoadPredefinedFunctions } from './wailsjs/go/main/App';
        window.SavePredefinedFunctions = SavePredefinedFunctions;
        window.AIChat = AIChat;
        window.GetAIConfig = GetAIConfig;
        window.SetAIConfig = SetAIConfig;
        window.LoadPredefinedFunctions = LoadPredefinedFunctions;

        // Puente hacia p2plite (ver p2p.go). Va agrupado en window.p2p en vez de
        // sueltas: son 18 y todas del mismo tema. Los ƒ del place "p2p @" son
        // los que le dan forma; esto solo las pone al alcance.
        import * as P2P from './wailsjs/go/main/App';
        import { EventsOn } from './wailsjs/runtime/runtime';
        window.p2p = {
            Start: P2P.P2PStart,
            Stop: P2P.P2PStop,
            ID: P2P.P2PID,
            Addrs: P2P.P2PAddrs,
            FullAddrs: P2P.P2PFullAddrs,
            Peers: P2P.P2PPeers,
            RoutingTableSize: P2P.P2PRoutingTableSize,
            ConnKind: P2P.P2PConnKind,
            ConnIP: P2P.P2PConnIP,
            Announce: P2P.P2PAnnounce,
            StopAnnounce: P2P.P2PStopAnnounce,
            FindProviders: P2P.P2PFindProviders,
            Connect: P2P.P2PConnect,
            OpenStream: P2P.P2POpenStream,
            StreamWrite: P2P.P2PStreamWrite,
            StreamRead: P2P.P2PStreamRead,
            StreamCloseWrite: P2P.P2PStreamCloseWrite,
            StreamClose: P2P.P2PStreamClose,
        };
        window.EventsOn = EventsOn;

        // msgpack: el formato de lo que viaja ENTRE peers. Ojo, no sustituye al
        // base64 — los bindings de Wails vuelven por JSON (dispatcher/calls.go)
        // y encoding/json ya codifica []byte en base64, así que ese salto es
        // inevitable. Lo que aporta msgpack es que por el stream puedan ir
        // objetos, números y binario en vez de solo texto.
        // Vite lo empaqueta desde node_modules: sin CDN, como Monaco.
        import { encode as mpEncode, decode as mpDecode } from '@msgpack/msgpack';
        window.msgpack = { encode: mpEncode, decode: mpDecode };
    </script>

    <script>

       

        const MONACO_BASE_URL = window.location.origin;
        const MONACO_THEME_NAME = "glass-dark";
        // Sin 'color': los iconos heredan currentColor (blanco). El lenguaje ya
        // se distingue por su glifo y por el nombre de al lado; el color de
        // marca era el único punto de color fuera del editor.
        const LANGUAGE_OPTIONS = [
            { id: "html", name: "HTML", icon: "fab fa-html5" },
            { id: "javascript", name: "JavaScript", icon: "fab fa-js-square" },
            { id: "css", name: "CSS", icon: "fab fa-css3-alt" },
            { id: "python", name: "Python", icon: "fab fa-python" },
            { id: "go", name: "Go", icon: "fab fa-golang" },
            // JSON es el lenguaje de los átomos ":" (· : editor ƒ lo pide por
            // nombre). Sin esta entrada Monaco sí resaltaba, pero el selector
            // no lo encontraba y mostraba "JavaScript" en la cabecera.
            { id: "json", name: "JSON", icon: "fas fa-file-code" },
            { id: "plaintext", name: "Texto", icon: "fas fa-file-alt" },
        ];
        const LANGUAGE_ALIAS_MAP = {
            html: "html",
            js: "javascript",
            javascript: "javascript",
            css: "css",
            py: "python",
            python: "python",
            go: "go",
            json: "json",
            text: "plaintext",
            plaintext: "plaintext",
        };
        const MONACO_THEME = {
            base: "vs-dark",
            inherit: true,
            rules: [],
            colors: {
                "editor.background": "#0b0b0b42",
                "editorGutter.background": "#0b0b0b24",
                "editorLineNumber.foreground": "#94a3b8",
                "editorLineNumber.activeForeground": "#f8fafc",
                "editorCursor.foreground": "#f8fafc",
                "editor.selectionBackground": "#ffffff18",
                "editor.inactiveSelectionBackground": "#ffffff10",
                "editor.lineHighlightBackground": "#ffffff08",
                "editor.lineHighlightBorder": "#00000000",
                "editorIndentGuide.background1": "#ffffff12",
                "editorIndentGuide.activeBackground1": "#ffffff22",
                "focusBorder": "#00000000",
                "contrastBorder": "#00000000",
                "contrastActiveBorder": "#00000000",
                "editorWidget.border": "#ffffff12",
                "scrollbarSlider.background": "#ffffff14",
                "scrollbarSlider.hoverBackground": "#ffffff24",
                "scrollbarSlider.activeBackground": "#ffffff30",
            },
        };

        require.config({
            paths: { vs: `${MONACO_BASE_URL}/vs` },
        });

        window.MonacoEnvironment = {
            getWorkerUrl() {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                self.MonacoEnvironment = {
                    baseUrl: '${MONACO_BASE_URL}/'
                };
                importScripts('${MONACO_BASE_URL}/vs/base/worker/workerMain.js');
            `)}`;
            },
        };

        class CodeEditor {
            constructor() {
                this.isMonacoLoaded = Boolean(window.monaco);
                this.isThemeDefined = false;
                this.monacoLoader = this.loadMonaco();
            }

            loadMonaco() {
                if (window.monaco) {
                    this.isMonacoLoaded = true;
                    return Promise.resolve(window.monaco);
                }

                if (this.monacoLoader && !this.isMonacoLoaded) {
                    return this.monacoLoader;
                }

                this.monacoLoader = new Promise((resolve, reject) => {
                    require(["vs/editor/editor.main"], () => {
                        this.isMonacoLoaded = true;
                        resolve(window.monaco);
                    }, reject);
                });

                return this.monacoLoader;
            }

            getLanguageOption(language) {
                const normalizedLanguage = LANGUAGE_ALIAS_MAP[language] || language;
                return LANGUAGE_OPTIONS.find((option) => option.id === normalizedLanguage)
                    || LANGUAGE_OPTIONS.find((option) => option.id === "javascript");
            }

            getMonacoLanguage(language) {
                return LANGUAGE_ALIAS_MAP[language] || language;
            }

            ensureTheme() {
                if (this.isThemeDefined) {
                    return;
                }

                monaco.editor.defineTheme(MONACO_THEME_NAME, MONACO_THEME);
                this.isThemeDefined = true;
            }

            createOverlay(title, initialLanguage) {
                const overlay = document.createElement("div");
                overlay.className = "editor-overlay";
                overlay.innerHTML = `
        <div class="editor-modal">
            <div class="editor-header">
                <div class="editor-title">
                    <div class="language-selector">
                        <button class="language-button" type="button" title="Seleccionar lenguaje">
                            <i class="${initialLanguage.icon}"></i>
                            <span class="language-name">${initialLanguage.name}</span>
                        </button>
                        <div class="language-dropdown">
                            ${LANGUAGE_OPTIONS.map((language) => `
                                <button class="dropdown-item" data-lang="${language.id}">
                                    <i class="${language.icon}"></i>
                                    <span>${language.name}</span>
                                </button>
                            `).join("")}
                        </div>
                    </div>
                    <span class="modal-title">${title}</span>
                </div>
                <div class="editor-controls">
                    <button class="ai-button" title="Asistente IA (Ctrl+I)">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </button>
                    <button class="save-button" title="Guardar (Ctrl+S)">
                        <i class="fas fa-save"></i>
                    </button>
                    <button class="close-button" title="Cerrar">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <div class="monaco-container" style="width:100%;height:100%;"></div>
        </div>
    `;
                return overlay;
            }

            getOverlayElements(overlay) {
                return {
                    container: overlay.querySelector(".monaco-container"),
                    languageSelector: overlay.querySelector(".language-selector"),
                    languageButton: overlay.querySelector(".language-button"),
                    languageIcon: overlay.querySelector(".language-button i"),
                    languageName: overlay.querySelector(".language-name"),
                    dropdown: overlay.querySelector(".language-dropdown"),
                    dropdownItems: overlay.querySelectorAll(".dropdown-item"),
                    saveButton: overlay.querySelector(".save-button"),
                    closeButton: overlay.querySelector(".close-button"),
                    aiButton: overlay.querySelector(".ai-button"),
                };
            }

            updateLanguageButton(elements, language) {
                elements.languageIcon.className = language.icon;
                elements.languageName.textContent = language.name;
            }

            createEditor(container, code, language) {
                this.ensureTheme();

                return monaco.editor.create(container, {
                    value: code,
                    language: this.getMonacoLanguage(language),
                    theme: MONACO_THEME_NAME,
                    automaticLayout: true,
                    fontSize: 14,
                    fontFamily: "Fira Code, Consolas, monospace",
                    scrollBeyondLastLine: false,
                    minimap: { enabled: false },
                    lineNumbers: "on",
                    roundedSelection: false,
                    scrollbars: {
                        vertical: "auto",
                        horizontal: "auto",
                    },
                });
            }

            buildMessages(code, language, instruction) {
                const system = (typeof diarsaba !== "undefined" && diarsaba.get)
                    ? diarsaba.get("ai system §")
                    : null;
                const systemContent = (typeof system === "string" && system.trim())
                    ? system
                    : `Eres un asistente de programación integrado en un editor de código. Estás editando un único átomo de código en lenguaje "${language}". Devuelve ÚNICAMENTE el código resultante, sin explicaciones y sin envolverlo en bloques markdown (nada de \`\`\`). Conserva el estilo y las convenciones del código existente.`;
                const userContent = `Código actual:\n\n${code || "(vacío)"}\n\nInstrucción: ${instruction}`;
                return [
                    { role: "system", content: systemContent },
                    { role: "user", content: userContent },
                ];
            }

            stripCodeFences(text) {
                const trimmed = String(text).trim();
                const match = trimmed.match(/^```[a-zA-Z0-9]*\s*\n([\s\S]*?)\n```$/);
                return match ? match[1] : trimmed;
            }

            askInstruction(anchor) {
                return new Promise((resolve) => {
                    const wrap = document.createElement("div");
                    wrap.className = "ai-prompt";
                    wrap.innerHTML = `
                        <input type="text" class="ai-prompt-input" placeholder="¿Qué quieres que haga la IA con este átomo?" spellcheck="false" />
                        <button class="ai-prompt-send" type="button" title="Enviar (Enter)"><i class="fas fa-arrow-up"></i></button>
                    `;
                    anchor.appendChild(wrap);

                    const input = wrap.querySelector(".ai-prompt-input");
                    const send = wrap.querySelector(".ai-prompt-send");
                    const finish = (value) => { wrap.remove(); resolve(value); };

                    input.addEventListener("keydown", (event) => {
                        event.stopPropagation();
                        if (event.key === "Enter") finish(input.value.trim() || null);
                        else if (event.key === "Escape") finish(null);
                    });
                    send.addEventListener("click", () => finish(input.value.trim() || null));
                    input.focus();
                });
            }

            async aiAssist(editor, elements, language) {
                if (this.aiBusy) return;

                const instruction = await this.askInstruction(elements.container.parentElement);
                if (!instruction) { editor.focus(); return; }

                this.aiBusy = true;
                const icon = elements.aiButton.querySelector("i");
                const previousIcon = icon.className;
                icon.className = "fas fa-spinner fa-spin";
                elements.aiButton.disabled = true;

                try {
                    const messages = this.buildMessages(editor.getValue(), language, instruction);
                    const raw = await window.AIChat(JSON.stringify(messages));
                    const result = this.stripCodeFences(raw);

                    const selection = editor.getSelection();
                    if (selection && !selection.isEmpty()) {
                        editor.executeEdits("ai-assist", [
                            { range: selection, text: result, forceMoveMarkers: true },
                        ]);
                    } else {
                        editor.setValue(result);
                    }
                } catch (error) {
                    console.error("AIChat error", error);
                    const message = (error && error.message) ? error.message : String(error);
                    if (message.includes("API key") && typeof window.openAIConfig === "function") {
                        await window.openAIConfig();
                    } else {
                        alert("Error de IA: " + message);
                    }
                } finally {
                    icon.className = previousIcon;
                    elements.aiButton.disabled = false;
                    this.aiBusy = false;
                    editor.focus();
                }
            }

            async open(title = "Editor de Código", code = "", language = "javascript") {
                await this.loadMonaco();

                return new Promise((resolve) => {
                    const initialLanguage = this.getLanguageOption(language);
                    const overlay = this.createOverlay(title, initialLanguage);
                    document.body.appendChild(overlay);

                    const elements = this.getOverlayElements(overlay);
                    const editor = this.createEditor(elements.container, code, initialLanguage.id);
                    const cleanupCallbacks = [];
                    let currentLanguage = initialLanguage.id;

                    const registerListener = (target, eventName, handler) => {
                        target.addEventListener(eventName, handler);
                        cleanupCallbacks.push(() => target.removeEventListener(eventName, handler));
                    };

                    const hideDropdown = () => {
                        elements.dropdown.classList.remove("show");
                    };

                    const closeEditor = (result) => {
                        cleanupCallbacks.forEach((cleanup) => cleanup());
                        editor.dispose();
                        overlay.remove();
                        resolve(result);
                    };

                    const changeLanguage = (nextLanguageId) => {
                        const nextLanguage = this.getLanguageOption(nextLanguageId);

                        if (!nextLanguage || currentLanguage === nextLanguage.id) {
                            return;
                        }

                        this.updateLanguageButton(elements, nextLanguage);
                        monaco.editor.setModelLanguage(editor.getModel(), this.getMonacoLanguage(nextLanguage.id));
                        currentLanguage = nextLanguage.id;
                        hideDropdown();
                    };

                    // Cancelar resuelve null; guardar resuelve el texto. Antes
                    // cancelar devolvía "", que es indistinguible de "el usuario
                    // vació el contenido": los editores de lista lo leían como
                    // vaciar y cerrar con Escape borraba la lista entera.
                    registerListener(elements.saveButton, "click", () => closeEditor(editor.getValue()));
                    registerListener(elements.closeButton, "click", () => closeEditor(null));
                    registerListener(elements.aiButton, "click", () => {
                        this.aiAssist(editor, elements, currentLanguage);
                    });
                    registerListener(elements.languageButton, "click", (event) => {
                        event.stopPropagation();
                        elements.dropdown.classList.toggle("show");
                    });
                    elements.dropdownItems.forEach((item) => {
                        registerListener(item, "click", (event) => {
                            event.stopPropagation();
                            changeLanguage(item.dataset.lang);
                        });
                    });
                    registerListener(document, "click", (event) => {
                        if (!elements.languageSelector.contains(event.target)) {
                            hideDropdown();
                        }
                    });
                    registerListener(document, "keydown", (event) => {
                        if (event.key === "Escape" && elements.dropdown.classList.contains("show")) {
                            hideDropdown();
                        }
                    });
                    registerListener(overlay, "click", (event) => {
                        if (event.target === overlay) {
                            closeEditor(null);
                        }
                    });

                    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
                        closeEditor(editor.getValue());
                    });
                    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyI, () => {
                        this.aiAssist(editor, elements, currentLanguage);
                    });
                    editor.addCommand(monaco.KeyCode.Escape, () => {
                        if (elements.dropdown.classList.contains("show")) {
                            hideDropdown();
                            return;
                        }

                        closeEditor(null);
                    });

                    editor.focus();
                });
            }
        }

        window.codeEditor = new CodeEditor();

        // Abre el editor JSON con la configuración de IA (proveedor, modelo,
        // baseURL, apiKey). La key se muestra enmascarada y vive solo en el
        // backend Go, fuera del repositorio.
        window.openAIConfig = async () => {
            const template = {
                provider: "openai",
                model: "gpt-4o-mini",
                baseURL: "https://api.openai.com/v1",
                apiKey: "",
            };
            let current = JSON.stringify(template, null, 2);
            try {
                const loaded = await window.GetAIConfig();
                const parsed = loaded && loaded.trim() ? JSON.parse(loaded) : {};
                // Si ya hay algo configurado, mostramos eso; si está todo vacío,
                // mostramos la plantilla con valores por defecto.
                if (parsed.provider || parsed.baseURL || parsed.apiKey) {
                    current = JSON.stringify({ ...template, ...parsed }, null, 2);
                }
            } catch (e) {
                console.error("GetAIConfig error", e);
            }

            const res = await window.codeEditor.open("Configuración de IA", current, "json");
            if (res != null && res.trim() !== "") {
                try {
                    await window.SetAIConfig(res);
                } catch (e) {
                    console.error("SetAIConfig error", e);
                    alert("No se pudo guardar la configuración de IA: " + (e && e.message ? e.message : e));
                }
            }
        };

        function createFunction(functionString) {
            const n = functionString.trim(),
                t = [
                    /^async\s*\(([^)]*)\)\s*=>\s*\{([\s\S]*)\}$/,
                    /^async\s*\(([^)]*)\)\s*=>\s*([^{].*)$/,
                    /^async\s+function[^(]*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^async\s+function\s*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^\(([^)]*)\)\s*=>\s*\{([\s\S]*)\}$/,
                    /^\(([^)]*)\)\s*=>\s*([^{].*)$/,
                    /^function[^(]*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                    /^function\s*\(([^)]*)\)\s*\{([\s\S]*)\}$/,
                ];
            for (const s of t) {
                const t = n.match(s);
                if (t) {
                    const n = t[1]
                        .split(",")
                        .map((n) => n.trim())
                        .filter((n) => n);
                    let i = t[2];
                    const c = s.toString().includes("async");
                    // Los patrones de cuerpo conciso (flecha sin llaves) capturan el
                    // cuerpo con "[^{]"; a esos hay que anteponerles "return" para que
                    // la función devuelva el valor de la expresión.
                    const isConciseArrow = s.toString().includes("[^{]");
                    if (isConciseArrow && !i.trim().startsWith("return")) {
                        i = `return ${i}`;
                    }
                    let r = null;
                    if (c) {
                        const t = `\n        return (async function(${n.join(
                            ", "
                        )}) {\n            ${i}\n        }).apply(this, arguments);\n    `;
                        r = new Function(...n, t);
                    } else r = new Function(...n, i);
                    const o = (...n) => r.apply(this, n);
                    return (
                        Object.defineProperty(o, "toString", {
                            value: () => functionString.trim(),
                            writable: !1,
                            configurable: !0,
                        }),
                        o
                    );
                }
            }
            throw new Error(`No se pudo parsear la función: ${functionString}`);
        }

        async function threads(e) {
            if (e.endsWith("~")) {
                const s = diarsaba.get(e);
                for (let e = 0; e < s.length; e++) threads(s[e]);
            } else if (e.endsWith("!")) {
                const s = diarsaba.get(e);
                if (s) {
                    const a = diarsaba.get(s[0]);

                    if (a && typeof a === "function") a.apply(null, s.slice(1));
                    else {
                        const a = `\n• Función buscada: "${s[0]
                            }"\n• Llamada desde: "${e}"\n• Parámetros esperados: [${s
                                .slice(1)
                                .map((e) => `"${e}"`)
                                .join(", ")}]\n  → ${e}\n     → ${s[0]} (NO ENCONTRADO)`.trim();
                        alert(a);
                    }
                } else {
                    const s = `• no exist "${e}"`.trim();
                    alert(s);
                }
            }
        }



        const diarsaba = new Map();

        window.addEventListener("DOMContentLoaded", async () => {

            // El JSON lo provee el backend Go (LoadPredefinedFunctions): en dev lee
            // el archivo del repo, en prod la copia escribible sembrada desde el
            // embebido — así funciona igual en `wails dev` y en el build. Si no hay
            // backend (p.ej. abriendo el frontend suelto), cae a fetch.
            let predefinedFunctions;
            try {
                if (typeof window.LoadPredefinedFunctions !== "function") throw new Error("sin backend");
                predefinedFunctions = JSON.parse(await window.LoadPredefinedFunctions());
            } catch (e) {
                const response = await fetch("predefined_functions.json");
                predefinedFunctions = await response.json();
            }

            // Un átomo ƒ inválido no debe tumbar el arranque entero. Si no
            // compila, queda un "stub" inerte que CONSERVA el código original en
            // toString(): así no se pierde al guardar y se puede seguir abriendo
            // en el editor para corregirlo.
            const stubRoto = (source, key) => {
                // Si el valor ni siquiera era código (null, "null", vacío), lo
                // normalizamos a una función vacía válida para no perpetuarlo al
                // guardar. Si SÍ era código (con un error), se conserva tal cual.
                const src = typeof source === "string" ? source.trim() : "";
                const esCodigo = src && src !== "null" && src !== "undefined";
                const original = esCodigo ? source : "()=>{}";
                const f = () => {
                    console.error(`[diarsaba] "${key}" no compiló: es inerte. Ábrelo en el editor para corregirlo.`);
                };
                Object.defineProperty(f, "toString", {
                    value: () => original,
                    writable: false,
                    configurable: true,
                });
                return f;
            };

            const funcionesRotas = [];

            for (const [key, value] of Object.entries(predefinedFunctions)) {
                if (key.endsWith("ƒ")) {
                    try {
                        diarsaba.set(key, createFunction(value));
                    } catch (e) {
                        funcionesRotas.push(key);
                        diarsaba.set(key, stubRoto(value, key));
                    }
                } else {
                    diarsaba.set(key, value);
                }
            }

            if (funcionesRotas.length) {
                console.warn(
                    `[diarsaba] ${funcionesRotas.length} función(es) no compilaron y quedaron inertes ` +
                    `(su código se conserva, puedes editarlas):`,
                    funcionesRotas
                );
            }
